<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:;">
<meta name="theme-color" content="#075E54">
<title>D7 Follow-ups</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#efeae2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
.app{display:flex;height:100dvh;width:100%;}
/* SIDEBAR */
.sidebar{width:100%;max-width:420px;display:flex;flex-direction:column;background:#fff;border-right:1px solid #e9edef;flex-shrink:0;}
.wpp-header{background:#075E54;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.wpp-av{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.wpp-av img{width:100%;height:100%;object-fit:cover;}
.wpp-title{flex:1;color:#fff;font-size:17px;font-weight:600;}
.wpp-sub{color:rgba(255,255,255,.7);font-size:12px;}
.btn-plus{background:#25D366;border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* TABS */
.tabs{display:flex;background:#054d44;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.1);}
.tab{flex:1;padding:10px 4px;background:none;border:none;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;transition:all .15s;}
.tab.on{color:#fff;border-bottom:3px solid #25D366;}
/* STATS */
.stats{display:flex;background:#054d44;flex-shrink:0;}
.stat{flex:1;text-align:center;padding:8px 4px;}
.sn{font-size:20px;font-weight:700;color:#fff;}
.sn.r{color:#ff6b6b;}
.sl{font-size:10px;color:rgba(255,255,255,.65);margin-top:1px;}
/* SEARCH */
.searchbar{padding:7px 12px;background:#f0f2f5;border-bottom:1px solid #e9edef;flex-shrink:0;}
.si{background:#fff;border-radius:8px;display:flex;align-items:center;padding:7px 12px;gap:8px;}
.si input{border:none;outline:none;font-size:14px;color:#111;flex:1;background:transparent;}
/* LIST */
.clist{flex:1;overflow-y:auto;}
.sechdr{background:#f0f2f5;padding:6px 16px;font-size:12px;font-weight:600;color:#555;}
.crow{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #f0f2f5;cursor:pointer;gap:10px;transition:background .1s;}
.crow:hover,.crow.sel{background:#f0f9ff;}
.av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;}
.r{background:#ffebee;color:#c62828;}.a{background:#fff8e1;color:#e65100;}.g{background:#e8f5e9;color:#2e7d32;}
.cbody{flex:1;min-width:0;}
.cname{font-size:15px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cpre{font-size:12px;color:#667;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ct{font-size:11px;color:#999;}
.bdg{min-width:18px;height:18px;border-radius:9px;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.bdr{background:#ef4444;}.bda{background:#f59e0b;}.bdg2{background:#25D366;}
/* CATALOG */
.catlog{flex:1;overflow-y:auto;padding:12px;display:none;}
.catsec{margin-bottom:18px;}
.cattit{font-size:12px;font-weight:700;color:#075E54;background:#e8f5e9;padding:6px 12px;border-radius:8px;margin-bottom:8px;letter-spacing:.03em;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.pcard{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.12);cursor:pointer;}
.pcard:hover{transform:scale(1.02);}
.pimg{width:100%;height:120px;object-fit:cover;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:36px;}
.pimg img{width:100%;height:100%;object-fit:cover;}
.pinfo{padding:8px 10px;}
.pname{font-size:13px;font-weight:600;color:#111;line-height:1.3;}
.pemb{font-size:11px;color:#25D366;margin-top:3px;font-weight:500;}
.pdesc{font-size:11px;color:#888;margin-top:3px;line-height:1.4;}
/* DETAIL */
.detail{flex:1;display:flex;flex-direction:column;background:#efeae2;}
.dempty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#888;gap:10px;}
.dempty-icon{font-size:70px;opacity:.3;}
.dhdr{background:#075E54;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.dhav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.dhi{flex:1;}
.dhn{color:#fff;font-size:17px;font-weight:600;}
.dhs{color:rgba(255,255,255,.75);font-size:12px;margin-top:2px;}
.btn-edit{background:none;border:1px solid rgba(255,255,255,.5);color:#fff;padding:6px 12px;border-radius:18px;font-size:12px;cursor:pointer;margin-right:6px;}
.btn-del{background:none;border:1px solid rgba(255,100,100,.5);color:#ffaaaa;padding:6px 12px;border-radius:18px;font-size:12px;cursor:pointer;}
.dbody{flex:1;overflow-y:auto;padding:16px;}
.icard{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.08);}
.ictit{font-size:11px;font-weight:700;color:#075E54;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.irow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
.irow:last-child{border-bottom:none;}
.il{color:#999;}.iv{color:#111;font-weight:500;text-align:right;}
.nxtcard{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:12px;border-left:4px solid #25D366;box-shadow:0 1px 2px rgba(0,0,0,.08);}
.nxtdate{font-size:20px;font-weight:600;color:#111;margin-top:4px;}
.nxtsub{font-size:12px;color:#667;margin-top:2px;}
.obscard{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.08);}
.obsbub{background:#dcf8c6;border-radius:8px;padding:10px 12px;font-size:13px;color:#333;line-height:1.5;margin-top:8px;}
.dftr{padding:14px 16px;background:#f0f2f5;border-top:1px solid #e9edef;display:flex;gap:10px;flex-shrink:0;}
.bwpp{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;background:#25D366;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.bwpp:hover{background:#1fbc5b;}
.bdone{padding:12px 18px;border-radius:10px;background:#fff;color:#075E54;border:2px solid #075E54;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
/* FAB */
.fab{display:none;position:fixed;bottom:22px;right:20px;width:54px;height:54px;border-radius:50%;background:#25D366;color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.3);align-items:center;justify-content:center;z-index:10;}
@media(max-width:700px){.sidebar{max-width:100%;}.detail{display:none;position:fixed;inset:0;z-index:50;}.detail.mopen{display:flex;}.fab{display:flex;}.dback{display:flex!important;}}
.dback{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;margin-right:4px;}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;}
.ov.show{display:flex;}
.modal{background:#fff;border-radius:14px;padding:0 20px 28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:pop .2s ease;}
@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.mhdr{background:#075E54;margin:0 -20px 18px;padding:14px 20px;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:space-between;}
.mhtit{color:#fff;font-size:16px;font-weight:600;}
.mbtn-x{background:none;border:none;color:rgba(255,255,255,.8);font-size:20px;cursor:pointer;}
.field{margin-bottom:13px;}
.field label{font-size:11px;color:#667;display:block;margin-bottom:4px;font-weight:500;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;color:#111;background:#fff;-webkit-appearance:none;}
.field textarea{resize:none;line-height:1.5;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#25D366;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border:1px solid #ddd;border-radius:18px;font-size:12px;cursor:pointer;background:#fff;color:#333;user-select:none;}
.chip:hover{border-color:#25D366;}
.chip.on{background:#e8f5e9;border-color:#25D366;color:#075E54;font-weight:500;}
.nprev{font-size:12px;color:#075E54;background:#e8f5e9;border-radius:7px;padding:8px 12px;margin-bottom:14px;}
.macts{display:flex;gap:10px;}
.bsave{flex:1;padding:12px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.bsave:hover{background:#1fbc5b;}
.bcx{padding:12px 16px;background:#f0f2f5;color:#667;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;}
.empty{text-align:center;padding:40px 20px;color:#999;font-size:13px;}



/* AI CHAT */
.chat-fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.chat-fab:hover{transform:scale(1.08);}
.chat-badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:#25D366;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.chat-panel{position:fixed;bottom:90px;right:24px;width:340px;max-width:calc(100vw - 32px);background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:200;display:none;flex-direction:column;overflow:hidden;max-height:70vh;}
.chat-panel.open{display:flex;}
.chat-hdr{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:14px 16px;display:flex;align-items:center;gap:10px;}
.chat-hdr-av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;}
.chat-hdr-info{flex:1;}
.chat-hdr-name{color:#fff;font-size:15px;font-weight:600;}
.chat-hdr-sub{color:rgba(255,255,255,.75);font-size:11px;}
.chat-close{background:none;border:none;color:rgba(255,255,255,.8);font-size:20px;cursor:pointer;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;background:#f0f2f5;display:flex;flex-direction:column;gap:10px;min-height:180px;}
.msg-ai{background:#fff;color:#111;align-self:flex-start;border-radius:4px 10px 10px 10px;padding:9px 12px;font-size:13px;line-height:1.5;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.msg-user{background:#dcf8c6;color:#111;align-self:flex-end;border-radius:10px 4px 10px 10px;padding:9px 12px;font-size:13px;line-height:1.5;max-width:85%;}
.msg-loading{background:#fff;color:#888;align-self:flex-start;font-style:italic;padding:9px 12px;border-radius:4px 10px 10px 10px;font-size:13px;}
.chat-sugs{padding:8px 12px;background:#fff;border-top:1px solid #f0f2f5;display:flex;gap:6px;flex-wrap:wrap;}
.sug{font-size:11px;padding:5px 10px;border:1px solid #6366f1;border-radius:14px;color:#6366f1;background:none;cursor:pointer;white-space:nowrap;}
.chat-input-row{display:flex;padding:10px 12px;gap:8px;border-top:1px solid #e9edef;background:#fff;}
.chat-input{flex:1;border:1px solid #ddd;border-radius:20px;padding:8px 14px;font-size:13px;font-family:inherit;outline:none;resize:none;}
.chat-input:focus{border-color:#6366f1;}
.btn-send{width:36px;height:36px;border-radius:50%;background:#6366f1;color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
</style>
</head>

function maskCNPJ(el){let v=el.value.replace(/\D/g,'');if(v.length>14)v=v.slice(0,14);v=v.replace(/^(\d{2})(\d)/,'$1.$2');v=v.replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3');v=v.replace(/\.(\d{3})(\d)/,'.$1/$2');v=v.replace(/(\d{4})(\d)/,'$1-$2');el.value=v;}

async function buscaCNPJ(){
  const cnpj=document.getElementById('fcnpj').value.replace(/\D/g,'');
  if(cnpj.length!==14){alert('Digite um CNPJ válido com 14 dígitos');return;}
  try{
    const r=await fetch('https://brasilapi.com.br/api/cnpj/v1/'+cnpj);

    const d=await r.json();
    document.getElementById('fn').value=d.nome_fantasia||d.razao_social||'';

  }catch(e){alert('Erro ao buscar CNPJ. Tente novamente.');}
}
async function buscaCEP(){

function openForm(){editId=null;document.getElementById('mtit').textContent='👤 Novo cliente';['fn','fe','ft','fo','fcnpj','fcep','fcidade','fest','fgestor'].forEach(id=>document.getElementById(id).value='');document.getElementById('fl').value=fmt(TODAY);document.getElementById('fnx').value='';document.getElementById('fi').value='14';setChips([]);cp();document.getElementById('ov').classList.add('show');setTimeout(()=>document.getElementById('fn').focus(),200);}
function closeForm(){document.getElementById('ov').classList.remove('show');}
function handleOv(e){if(e.target===document.getElementById('ov'))closeForm();}
function save(){const name=document.getElementById('fn').value.trim();if(!name){document.getElementById('fn').focus();return;}const lv=document.getElementById('fl').value||fmt(TODAY);const mnx=document.getElementById('fnx').value;const iv=parseInt(document.getElementById('fi').value)||14;const nx=mnx?new Date(mnx+'T00:00:00'):nv(new Date(lv+'T00:00:00'),iv);const prods=getChips();const extra={cnpj:document.getElementById('fcnpj').value.trim(),cep:document.getElementById('fcep').value.trim(),cidade:document.getElementById('fcidade').value.trim(),estado:document.getElementById('fest').value.trim(),gestor:document.getElementById('fgestor').value.trim()};if(editId){const c=clients.find(x=>x.id===editId);if(c){c.name=name;c.emp=document.getElementById('fe').value.trim();c.tel=document.getElementById('ft').value.trim().replace(/\D/g,'');c.prod=prods;c.last=lv;c.next=fmt(nx);c.obs=document.getElementById('fo').value.trim();Object.assign(c,extra);}sv(clients);closeForm();render();setTimeout(()=>sel(editId),100);}else{const c={id:Date.now(),name,emp:document.getElementById('fe').value.trim(),tel:document.getElementById('ft').value.trim().replace(/\D/g,''),prod:prods,last:lv,next:fmt(nx),obs:document.getElementById('fo').value.trim(),...extra};clients.unshift(c);sv(clients);closeForm();render();setTimeout(()=>sel(c.id),100);}}
function cardH(c){const s=st(c.next);const isS=actId===c.id;return'<div class="crow'+(isS?' sel':'')+'" id="r'+c.id+'" onclick="sel('+c.id+')">'+'<div class="av '+avCl(s)+'">'+ini(c.name)+'</div>'+'<div class="cbody"><div class="cname">'+c.name+'</div><div class="cpre">'+(c.emp||'')+(c.prod&&c.prod.length?' · '+(Array.isArray(c.prod)?c.prod.join(', '):c.prod):'')+'</div></div>'+'<div class="cright"><div class="ct">'+dl(c.next)+'</div>'+(s==='urg'?'<div class="bdg bdr">!</div>':s==='wk'?'<div class="bdg bda">!</div>':'<div class="bdg bdg2">✓</div>')+'</div></div>';}
function render(){document.getElementById('dtlbl').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});const all=clients;document.getElementById('su').textContent=all.filter(c=>st(c.next)==='urg').length;document.getElementById('sw').textContent=all.filter(c=>st(c.next)==='wk').length;document.getElementById('so').textContent=all.filter(c=>st(c.next)==='ok').length;const q=(document.getElementById('sq').value||'').toLowerCase();const fl=q?clients.filter(c=>(c.name+(c.emp||'')).toLowerCase().includes(q)):clients;document.getElementById('emp').style.display=clients.length===0?'block':'none';const urg=fl.filter(c=>st(c.next)==='urg');const wk=fl.filter(c=>st(c.next)==='wk');const ok=fl.filter(c=>st(c.next)==='ok');let h='';if(urg.length)h+='<div class="sechdr">⚠️ Contatar agora</div>'+urg.map(cardH).join('');if(wk.length)h+='<div class="sechdr">📅 Esta semana</div>'+wk.map(cardH).join('');if(ok.length)h+='<div class="sechdr">✓ Próximos</div>'+ok.map(cardH).join('');document.getElementById('clist').innerHTML=document.getElementById('emp').outerHTML+h;}
render();
</script>

<button class="chat-fab" onclick="toggleChat()" title="D7X">🤖<span class="chat-badge">IA</span></button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-hdr">
    <div class="chat-hdr-av">🤖</div>
    <div class="chat-hdr-info"><div class="chat-hdr-name">D7X</div><div class="chat-hdr-sub">Seu assistente digital de vendas</div></div>
    <button class="chat-close" onclick="toggleChat()">×</button>
  </div>
  <div class="chat-msgs" id="chat-msgs">
    <div class="msg-ai">Olá! Sou o D7X. Pergunte sobre produtos, preços ou peça uma mensagem pronta pra WhatsApp! 💪</div>
  </div>
  <div class="chat-sugs" id="chat-sugs">
    <button class="sug" onclick="askSug(this)">📝 Mensagem pra cliente novo</button>
    <button class="sug" onclick="askSug(this)">💰 Como fechar pedido grande</button>
    <button class="sug" onclick="askSug(this)">🔁 Reativar cliente parado</button>
    <button class="sug" onclick="askSug(this)">📦 Diferença Mascavo x Demerara</button>
  </div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chat-input" rows="1" placeholder="Pergunte algo..." onkeydown="chatKey(event)"></textarea>
    <button class="btn-send" onclick="sendChat()">➤</button>
  </div>
</div>
<script>
let chatHistory=[];
function toggleChat(){const p=document.getElementById('chat-panel');p.classList.toggle('open');if(p.classList.contains('open'))document.getElementById('chat-input').focus();}
function askSug(el){document.getElementById('chat-input').value=el.textContent.trim().replace(/^[^\w]+/,'');document.getElementById('chat-sugs').style.display='none';sendChat();}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
function addMsg(text,type){const d=document.createElement('div');d.className='msg-'+type;d.textContent=text;const m=document.getElementById('chat-msgs');m.appendChild(d);m.scrollTop=m.scrollHeight;return d;}
async function sendChat(){
  const inp=document.getElementById('chat-input');
  const msg=inp.value.trim();if(!msg)return;
  inp.value='';
  addMsg(msg,'user');
  chatHistory.push({role:'user',content:msg});
  const loading=addMsg('Pensando...','loading');
  try{
    const res=await fetch('https://d7-chat.d7representacao.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,history:chatHistory.slice(-10)})});
    const data=await res.json();
    loading.remove();
    const reply=data.reply||'Desculpe, não consegui responder agora.';
    chatHistory.push({role:'assistant',content:reply});
    addMsg(reply,'ai');
  }catch(e){loading.remove();addMsg('Erro ao conectar. Tente novamente.','ai');}
}
</script>
